name: Publish to PyPI

# Publishes a release to PyPI when a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) -- no API token/secret required.
# One-time setup on PyPI: Project -> Publishing -> add a trusted publisher for
#   owner: abhishek085, repo: nokast-privacy-masker,
#   workflow: publish.yml, environment: pypi

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check artifacts
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
